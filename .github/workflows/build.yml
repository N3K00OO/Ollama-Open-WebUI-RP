name: Build and Publish GHCR Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - '.runpod/**'
      - 'docker-bake.hcl'
      - 'Dockerfile'
      - 'proxy/**'
      - 'scripts/**'
      - 'README.md'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - '.runpod/**'
      - 'docker-bake.hcl'
      - 'Dockerfile'
      - 'proxy/**'
      - 'scripts/**'
      - 'README.md'
  schedule:
    # GitHub cron is calendar-based, so this runs at 00:00 UTC every 5th day-of-month step.
    - cron: "0 0 */5 * *"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runpod-hub-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build RunPod Hub image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f .runpod/Dockerfile . -t runpod-hub-smoke

      - name: Validate handler contract in container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --entrypoint python runpod-hub-smoke /ci_smoke.py

      - name: Run worker in local test mode
        shell: bash
        run: |
          set -euo pipefail

          cat > .runpod/test_input.json <<'EOF'
          {
            "input": {
              "action": "health"
            }
          }
          EOF

          cid="$(docker run -d -v "${PWD}/.runpod/test_input.json:/test_input.json:ro" runpod-hub-smoke)"
          trap 'docker rm -f "${cid}" >/dev/null 2>&1 || true; rm -f .runpod/test_input.json' EXIT

          for _ in $(seq 1 20); do
            status="$(docker inspect -f '{{.State.Status}}' "${cid}")"
            if [ "${status}" = "exited" ]; then
              break
            fi
            sleep 1
          done

          status="$(docker inspect -f '{{.State.Status}}' "${cid}")"
          exit_code="$(docker inspect -f '{{.State.ExitCode}}' "${cid}")"
          logs="$(docker logs "${cid}" 2>&1 || true)"

          printf '%s\n' "${logs}"

          if [ "${status}" != "exited" ] || [ "${exit_code}" != "0" ]; then
            echo "RunPod Hub worker did not complete successfully in local test mode."
            exit 1
          fi

          if [[ "${logs}" != *"Starting Serverless Worker"* ]]; then
            echo "RunPod Hub worker did not emit the expected startup log."
            exit 1
          fi

  smoke:
    needs: runpod-hub-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_repo: ${{ steps.image.outputs.repo }}
      smoke_repo: ${{ steps.image.outputs.smoke_repo }}
      llama_cpp: ${{ steps.versions.outputs.llama_cpp }}
      open_webui: ${{ steps.versions.outputs.open_webui }}
      torch: ${{ steps.versions.outputs.torch }}
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'
          remove-swapfile: 'true'

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image repositories
        id: image
        shell: bash
        run: |
          echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "smoke_repo=llama-open-webui-smoke" >> "$GITHUB_OUTPUT"

      - name: Resolve latest upstream versions
        id: versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          llama_cpp_version="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/ggml-org/llama.cpp/releases/latest |
            python3 -c "import json, sys; print(json.load(sys.stdin)['tag_name'])"
          )"

          open_webui_version="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/open-webui/open-webui/releases/latest |
            python3 -c "import json, sys; print(json.load(sys.stdin)['tag_name'].lstrip('v'))"
          )"

          torch_version="$(
            python3 -c "from pathlib import Path; import re; match = re.search(r'variable \"TORCH_VERSION\"\\s*\\{\\s*default = \"([^\"]+)\"', Path('docker-bake.hcl').read_text(), re.S); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit('Unable to resolve TORCH_VERSION from docker-bake.hcl')))"
          )"

          echo "llama_cpp=${llama_cpp_version}" >> "$GITHUB_OUTPUT"
          echo "open_webui=${open_webui_version}" >> "$GITHUB_OUTPUT"
          echo "torch=${torch_version}" >> "$GITHUB_OUTPUT"

          echo "Resolved llama.cpp ${llama_cpp_version}"
          echo "Resolved Open WebUI ${open_webui_version}"
          echo "Resolved PyTorch ${torch_version}"

      - name: Build smoke image
        uses: docker/bake-action@v7
        env:
          IMAGE_REPO_NAME: ${{ steps.image.outputs.smoke_repo }}
        with:
          source: .
          pull: true
          load: true
          targets: base-12-6
          set: |
            *.args.LLAMA_CPP_VERSION=${{ steps.versions.outputs.llama_cpp }}
            *.args.OPEN_WEBUI_VERSION=${{ steps.versions.outputs.open_webui }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Run smoke checks
        shell: bash
        run: |
          set -euo pipefail

          smoke_image="${{ steps.image.outputs.smoke_repo }}:base-torch${{ steps.versions.outputs.torch }}-cu126"
          docker run --rm --entrypoint /opt/llama-open-webui/scripts/ci_smoke.sh "${smoke_image}"

  bake:
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [base]
        cuda: [12-4, 12-5, 12-6, 12-8, 13-0]
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'
          remove-swapfile: 'true'

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/bake-action@v7
        env:
          IMAGE_REPO_NAME: ${{ needs.smoke.outputs.image_repo }}
        with:
          source: .
          pull: true
          targets: ${{ matrix.target }}-${{ matrix.cuda }}
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.args.LLAMA_CPP_VERSION=${{ needs.smoke.outputs.llama_cpp }}
            *.args.OPEN_WEBUI_VERSION=${{ needs.smoke.outputs.open_webui }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Verify published GHCR image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          cuda_tag="cu${{ matrix.cuda }}"
          cuda_tag="${cuda_tag//-/}"
          image_ref="${{ needs.smoke.outputs.image_repo }}:base-torch${{ needs.smoke.outputs.torch }}-${cuda_tag}"

          docker buildx imagetools inspect "${image_ref}" > /dev/null
          echo "Verified ${image_ref}"
