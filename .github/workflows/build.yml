name: Build and Publish GHCR Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'docker-bake.hcl'
      - 'Dockerfile'
      - 'scripts/**'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'docker-bake.hcl'
      - 'Dockerfile'
      - 'scripts/**'
  schedule:
    # GitHub cron is calendar-based, so this runs at 00:00 UTC every 5th day-of-month step.
    - cron: "0 0 */5 * *"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [base]
        cuda: [12-6, 12-8, 13-0]
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'
          remove-swapfile: 'true'

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute GHCR image repository
        id: image
        shell: bash
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve latest upstream versions
        id: versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          llama_cpp_version="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/ggml-org/llama.cpp/releases/latest |
            python3 -c "import json, sys; print(json.load(sys.stdin)['tag_name'])"
          )"

          open_webui_version="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/open-webui/open-webui/releases/latest |
            python3 -c "import json, sys; print(json.load(sys.stdin)['tag_name'].lstrip('v'))"
          )"

          torch_version="$(
            python3 -c "from pathlib import Path; import re; match = re.search(r'variable \"TORCH_VERSION\"\\s*\\{\\s*default = \"([^\"]+)\"', Path('docker-bake.hcl').read_text(), re.S); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit('Unable to resolve TORCH_VERSION from docker-bake.hcl')))"
          )"

          echo "llama_cpp=${llama_cpp_version}" >> "$GITHUB_OUTPUT"
          echo "open_webui=${open_webui_version}" >> "$GITHUB_OUTPUT"
          echo "torch=${torch_version}" >> "$GITHUB_OUTPUT"

          echo "Resolved llama.cpp ${llama_cpp_version}"
          echo "Resolved Open WebUI ${open_webui_version}"
          echo "Resolved PyTorch ${torch_version}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/bake-action@v7
        env:
          IMAGE_REPO_NAME: ${{ steps.image.outputs.repo }}
        with:
          source: .
          pull: true
          targets: ${{ matrix.target }}-${{ matrix.cuda }}
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.args.LLAMA_CPP_VERSION=${{ steps.versions.outputs.llama_cpp }}
            *.args.OPEN_WEBUI_VERSION=${{ steps.versions.outputs.open_webui }}
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Verify published GHCR image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          cuda_tag="cu${{ matrix.cuda }}"
          cuda_tag="${cuda_tag//-/}"
          image_ref="${{ steps.image.outputs.repo }}:base-torch${{ steps.versions.outputs.torch }}-${cuda_tag}"

          docker buildx imagetools inspect "${image_ref}" > /dev/null
          echo "Verified ${image_ref}"
