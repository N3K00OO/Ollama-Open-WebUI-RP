name: Build and Publish GHCR Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'docker-bake.hcl'
      - 'Dockerfile'
      - 'scripts/**'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'docker-bake.hcl'
      - 'Dockerfile'
      - 'scripts/**'
  schedule:
    - cron: "0 */8 * * *"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [base]
        cuda: [12-6, 12-8, 13-0]
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-cached-tools: 'true'
          remove-swapfile: 'true'

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute GHCR image repository
        id: image
        shell: bash
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/bake-action@v7
        env:
          IMAGE_REPO_NAME: ${{ steps.image.outputs.repo }}
        with:
          source: .
          pull: true
          targets: ${{ matrix.target }}-${{ matrix.cuda }}
          push: ${{ github.event_name != 'pull_request' }}
